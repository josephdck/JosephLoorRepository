<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarea 4</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>Calculadora </h2>
    <p>Ingrese dos números:</p>

    <input type="number" id="num1" placeholder="Número 1">
    <input type="number" id="num2" placeholder="Número 2">

    <br>
    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);
    let salida = document.getElementById("resultado");

    if (isNaN(num1) || isNaN(num2)) {
        salida.innerHTML = "<p class='error'>Por favor ingrese ambos números.</p>";
        return;
    }

    let resultados = "";

    for (let i = 1; i <= 5; i++) {
        let res;

        switch(i) {
            case 1:
                res = num1 + num2;
                resultados += `<p>1. Suma: ${num1} + ${num2} = ${res}</p>`;
                break;
            case 2:
                res = num1 - num2;
                resultados += `<p>2. Resta: ${num1} - ${num2} = ${res}</p>`;
                break;
            case 3:
                res = num1 * num2;
                resultados += `<p>3. Multiplicación: ${num1} * ${num2} = ${res}</p>`;
                break;
            case 4:
                if (num2 === 0) {
                    resultados += `<p>4. División: No se puede dividir entre 0</p>`;
                } else {
                    res = num1 / num2;
                    resultados += `<p>4. División: ${num1} / ${num2} = ${res}</p>`;
                }
                break;
            case 5:
                if (num2 === 0) {
                    resultados += `<p>5. Módulo: No se puede usar % con 0</p>`;
                } else {
                    res = num1 % num2;
                    resultados += `<p>5. Módulo: ${num1} % ${num2} = ${res}</p>`;
                }
                break;
        }
    }

    salida.innerHTML = resultados;
}
</script>

</body>
</html>
