<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <title>Taller de Formulario Web</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="container">
 <form id="registroForm">
 <h2>Registro de Usuario</h2>

 <div class="input-group">
 <label for="nombre">Nombre Completo:</label>
 <input type="text" id="nombre" placeholder="Ej. Juan Pérez">
 <span class="error" id="errorNombre"></span>
 </div>
 <div class="input-group">
 <label for="email">Correo Electrónico:</label>
 <input type="email" id="email" placeholder="usuario@correo.com">
 <span class="error" id="errorEmail"></span>
 </div>
 <div class="input-group">
 <label for="password">Contraseña (mín. 8 caracteres, una mayúscula y un
número):</label>
 <input type="password" id="password">
 <span class="error" id="errorPass"></span>
 </div>
 <button type="submit">Enviar Registro</button>
 </form>
 </div>
 <script src="script.js"></script>
</body>
</html>
